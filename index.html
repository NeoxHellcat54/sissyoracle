<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#15061f" />
  <meta name="description" content="Dressed & Dared - a neon outfit, location, and dare randomizer." />
  <title>Dressed & Dared</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-neon">
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Neon Dressing Room</p>
        <h1>Dressed <span>&amp;</span> Dared</h1>
      </div>
      <div class="wallet" title="Exhys balance">
        <span class="wallet-icon">✦</span>
        <div>
          <strong id="exhysBalance">0</strong>
          <small>Exhys</small>
        </div>
      </div>
    </header>

    <main>
      <section id="view-home" class="view active"></section>
      <section id="view-wardrobe" class="view"></section>
      <section id="view-lists" class="view"></section>
      <section id="view-shop" class="view"></section>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-view="home"><span>◆</span>Home</button>
      <button class="nav-btn" data-view="wardrobe"><span>◇</span>Wardrobe</button>
      <button class="nav-btn" data-view="lists"><span>✚</span>Lists</button>
      <button class="nav-btn" data-view="shop"><span>✦</span>Shop</button>
    </nav>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
